[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "paris"
optimizer = true
optimizer_runs = 80000
via_ir = true

remappings = [
  "forge-std/=lib/forge-std/src/",
  "@chainlink/contracts-ccip/=lib/chainlink-ccip/chains/evm/",
  "@chainlink/contracts-ccip/contracts/=lib/chainlink-ccip/chains/evm/contracts/",
  "@chainlink/contracts/=lib/chainlink-evm/contracts/",
  "@openzeppelin/contracts@4.8.3/=lib/openzeppelin-contracts-4.8.3/contracts/",
  "@openzeppelin/contracts@5.0.2/=lib/openzeppelin-contracts/contracts/"
]

[rpc_endpoints]
ethereum_sepolia = "${ETHEREUM_SEPOLIA_RPC_URL}"
avalanche_fuji = "${AVALANCHE_FUJI_RPC_URL}"
